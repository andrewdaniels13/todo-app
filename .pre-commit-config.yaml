exclude: ^(node_modules|dist|coverage)/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: ^node_modules/
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: local
    hooks:
      - id: tsc-typecheck
        name: TypeScript type-check
        language: node
        entry: npx tsc --noEmit
        pass_filenames: false
        types: [ts]

      - id: eslint
        name: ESLint
        language: node
        entry: npx eslint --max-warnings=0
        types: [ts]
        pass_filenames: true
        files: \.ts$
        exclude: ^(dist|coverage|node_modules)/

      - id: jest-unit
        name: Jest unit tests
        language: node
        entry: npx jest --testPathPatterns="tests/unit" --forceExit --passWithNoTests
        pass_filenames: false
        always_run: true

      - id: dependency-health
        name: Dependency Health (UC16)
        language: system
        entry: npm audit --audit-level=high
        pass_filenames: false
        stages: [pre-commit]

      - id: structural-governance
        name: Structural Governance (UC18)
        language: node
        entry: node scripts/check-structural-governance.js
        pass_filenames: false
        always_run: true

      # ── Governance Layer (Step 8) ──────────────────────────────

      - id: iron-dome-any
        name: Iron Dome — any usage ratchet
        language: node
        entry: node scripts/governance/check-any-usage.js
        pass_filenames: false
        always_run: true

      - id: iron-dome-catches
        name: Iron Dome — silent catches ratchet
        language: node
        entry: node scripts/governance/check-silent-catches.js
        pass_filenames: false
        always_run: true

      - id: iron-dome-eslint-disable
        name: Iron Dome — eslint-disable ratchet
        language: node
        entry: node scripts/governance/check-eslint-disable.js
        pass_filenames: false
        always_run: true

      - id: rising-tide-mock-tax
        name: Rising Tide — mock tax (test LOC ≤ 2x source)
        language: node
        entry: node scripts/governance/check-mock-tax.js
        pass_filenames: false
        always_run: true

      - id: mock-quality
        name: Mock Quality — adversarial mock detection
        language: node
        entry: node scripts/governance/check-adversarial-mocks.js
        pass_filenames: false
        types: [ts]

      - id: srp-guardrails
        name: SRP Guardrails — file size limits
        language: node
        entry: node scripts/governance/guardrails-check.js
        pass_filenames: false
        always_run: true

      - id: test-discipline
        name: Test Discipline — skipped test gate
        language: node
        entry: node scripts/governance/check-skipped-tests.js
        pass_filenames: false
        always_run: true
